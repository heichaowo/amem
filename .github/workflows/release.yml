name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # OIDC token for npm trusted publishing. pnpm exchanges it with npmjs.org for
  # a short-lived publish token and attaches a sigstore provenance attestation —
  # provided a trusted publisher is configured for each package on npmjs.com
  # (repo + this workflow). Without that, pnpm falls back to NPM_TOKEN and skips
  # provenance. Requires pnpm >= 11.11 (see packageManager).
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens the release PR when changesets exist; once that PR is merged
      # (versions bumped), the next run publishes to npm.
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version
          publish: pnpm run release
          # Default is a bare "Version Packages", which reads as noise in the PR
          # list and breaks the repo's conventional-commit history. Name it for
          # what it is; the same string is used for the squash-merge commit.
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fallback auth for when OIDC trusted publishing is unavailable. pnpm
          # prefers OIDC when it can (and only then is provenance attached), so
          # this token is used only if the OIDC exchange is skipped. It can be
          # dropped once trusted publishing is confirmed working for every package.
          # (NPM_CONFIG_PROVENANCE is intentionally absent: pnpm ignores it — its
          # provenance comes from the OIDC path above, not that npm-CLI flag.)
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Mirror the plugin to ClawHub from the SAME freshly-built dist/ that was
      # just published to npm, so the two registries stay on the exact same
      # version. Runs only when changesets actually published openclaw-amem —
      # skipped on the runs that merely open/update the Version PR.
      - name: Publish plugin to ClawHub
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, 'openclaw-amem')
        working-directory: packages/openclaw-amem
        run: |
          # Pin the CLI: an unpinned global install lets a broken clawhub
          # release fail this step *after* npm has already published, leaving
          # the two registries on different versions. 0.23.1 is the version
          # OpenClaw itself pins for its own plugin publishes.
          npm i -g clawhub@0.23.1
          clawhub login --token "$CLAWHUB_TOKEN"
          pnpm pack --pack-destination "$RUNNER_TEMP"
          rm -rf "$RUNNER_TEMP/clawhub-pkg" && mkdir -p "$RUNNER_TEMP/clawhub-pkg"
          tar -xzf "$RUNNER_TEMP"/openclaw-amem-*.tgz -C "$RUNNER_TEMP/clawhub-pkg"
          # Feed the just-released CHANGELOG.md section (changesets writes it) as
          # the release notes so npm and ClawHub show the same changelog.
          NOTE=$(awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md)
          # Code plugins require source attribution; use the exact release commit.
          clawhub --no-input package publish "$RUNNER_TEMP/clawhub-pkg/package" \
            --family code-plugin --owner heichaowo \
            --source-repo "$GITHUB_REPOSITORY" \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-path packages/openclaw-amem \
            --changelog "$NOTE"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
