name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for the whole workflow: every job here only reads the repo.
# Set at workflow level so all jobs inherit it (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm -r <script>` skips packages that do not define <script>, without
      # saying so. Guard the Lint and Typecheck steps below against a package
      # quietly opting out of them.
      - name: Assert every package defines typecheck and lint
        run: node tools/assert-package-scripts.mjs

      # A published package must not depend on a private workspace one, or the
      # registry install 404s on it — this is what broke openclaw-amem@1.1.3.
      - name: Assert no published package depends on a private one
        run: node tools/assert-no-private-deps.mjs

      # Every env var the bundled code reads, and every plugin config key it
      # accepts, must be declared in the plugin manifest (or ClawHub silently
      # holds the release as it did for 1.2.0, and the host silently drops the
      # key) and documented in the config reference (or the wiki drifts).
      - name: Assert config is declared and documented
        run: node tools/assert-config-documented.mjs

      - name: Format check
        run: pnpm format

      - name: Lint
        run: pnpm -r lint

      # Must precede Typecheck: openclaw-amem inlines the amem engine, whose
      # `exports.types` points into its gitignored dist/. `pnpm -r build` is
      # topological, so amem builds first and the declarations exist.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm test:unit

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Credential scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Integration tests drive the real memory pipeline against a Qdrant service
  # container, with the LLM and embeddings mocked (deterministic, no API calls,
  # no model download). Unit tests run in the check job above.
  integration:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz >/dev/null 2>&1; then
              echo "Qdrant is ready"; exit 0
            fi
            sleep 1
          done
          echo "Qdrant did not become ready in time"; exit 1

      - name: Integration tests
        run: pnpm test:integration

  changeset-check:
    # Skip PRs that never carry a changeset by design: the changesets bot's
    # own "Version Packages" PR (it consumes them), and Dependabot bumps
    # (a changeset is added by the maintainer when the bump is released).
    if: >-
      github.event_name == 'pull_request'
      && github.head_ref != 'changeset-release/main'
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails the PR if any workspace package changed without a changeset —
      # including the private amem engine, because it is bundled into the
      # published plugin, so engine changes really do ship. When a change
      # genuinely needs no release, say so explicitly with
      # `pnpm changeset add --empty`. Changes outside a package (docs, CI)
      # are not flagged.
      - name: Require a changeset
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

  # The one status check to require in branch protection. It fails if any job
  # above failed or was cancelled, and stays green when a job legitimately skips
  # (changeset-check on the Version PR or a Dependabot PR). Because it is a
  # single stable name, changing the Node matrix never breaks the ruleset.
  ci-ok:
    if: always()
    needs: [check, secret-scan, integration, changeset-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every CI job succeeded or was skipped
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "job results: $results"
          if echo "$results" | grep -qE '(^|,)(failure|cancelled)(,|$)'; then
            echo "::error::a required CI job did not succeed"
            exit 1
          fi
          echo "all CI jobs succeeded or were skipped"
