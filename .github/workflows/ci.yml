name: A-MEM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format

      - name: Run ESLint check
        run: npm run lint

      - name: Run OpenClaw Boundary Check
        run: npm run check:boundaries

      - name: Run Build
        run: npm run build
