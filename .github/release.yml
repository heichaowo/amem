changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "✨ New Features"
      labels:
        - feat
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bug
    - title: "📝 Documentation"
      labels:
        - docs
        - documentation
    - title: "🔧 Maintenance"
      labels:
        - chore
        - ci
        - build
    - title: "⚡ Performance"
      labels:
        - perf
    - title: "🧪 Tests"
      labels:
        - test
    - title: "Other Changes"
