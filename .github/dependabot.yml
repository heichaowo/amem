version: 2
updates:
  # npm / pnpm workspace dependencies (root lockfile covers all packages).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Only propose versions that have been public for a while. This clears pnpm
    # 11's 24h minimumReleaseAge supply-chain gate — which otherwise fails CI on
    # a freshly published package — and gives a compromised release time to be
    # spotted. Cooldown applies to version updates only: security updates are
    # never delayed by it.
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      # Only batch routine dev tooling (minor/patch). Runtime (production) deps
      # and every MAJOR bump get an individual PR — so a breaking upgrade (e.g.
      # typescript 5 -> 7) is reviewed on its own instead of riding along with
      # harmless patches. Isolation > convenience for anything that can break.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  # GitHub Actions used in the workflows — one grouped PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # A freshly published action tag is a supply-chain risk too; let it soak.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
