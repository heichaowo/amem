version: 2
updates:
  # npm / pnpm workspace dependencies (root lockfile covers all packages).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Only batch dev tooling. Runtime (production) deps get an individual PR
      # each — so a subtle runtime regression is isolated to one dependency and
      # trivial to bisect/revert. Isolation > convenience for what actually ships.
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used in the workflows — one grouped PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
